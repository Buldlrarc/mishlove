[build]
  command = "npm run build"
  publish = "out"

# Pretty URLs for the self-contained game pages in public/
[[redirects]]
  from = "/empire"
  to = "/empire.html"
  status = 200

[[redirects]]
  from = "/nine-lanes"
  to = "/hop.html"
  status = 200

[[redirects]]
  from = "/nine-lives"
  to = "/game.html"
  status = 200

[[redirects]]
  from = "/arcade"
  to = "/arcade.html"
  status = 200

[[redirects]]
  from = "/shelter"
  to = "/shelter.html"
  status = 200

[[redirects]]
  from = "/books"
  to = "/books.html"
  status = 200
